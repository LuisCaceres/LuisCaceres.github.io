<html>
  <head>
    <title>Luis - Shopping List</title>
    <meta name="viewport" content="width=device-width,initial-scale=1">
  </head>
  <body>
    <style>
      table {
        border-collapse: collapse;
      }

      td,
      th {
        padding: 0.5rem;
        border: solid;
      }

      td:first-of-type {
        text-align: center;
      }

      td:nth-of-type(3) {
        text-align: right;
      }

      tr:has(:checked) {
        background-color: aquamarine;
      }

      th:nth-of-type(3) {
        white-space: pre-line;
      }

      .price,
      .quantity-in-cart {
        width: 3rem;
      }

      .table__container {
        width: 100%;
        margin-bottom: 1rem;
        overflow: auto;
      }
      
      .table__header {
        background-color: black;
        position: sticky;
        top: 0;
        color: white;
      }

      .toolbar {
        display: flex;
        justify-content: space-between;        
        align-items: center;
        padding: 1rem;
        background-color: black;
        position: sticky;
        bottom: 0;
        color: white;
      }

      .button__container,
      .total__container {
        margin: 0;
      }
      
      #insert-row {
        padding: 1rem;
        border: solid 0.25rem;
      }
    </style>

    <div class="table__container">
      <table>
        <tr class="table__header">
          <th>In?</th>
          <th>Product</th>
          <th>Quantity
          Required
          </th>
          <th>Quantity In Cart</th>
          <th>Amount</th>
          <th>Stock</th>
        </tr>
      </table>
    </div>

    <div class="toolbar">
      <p class="total__container">
        Total: <strong>$<span class="total">0</span></strong>
      </p>

      <p class="button__container">
        <button type="button" id="insert-row">Insert row</button>
      </p>
    </div>

    <template>
        <tr class="row">
          <td class="in">
            <input type="checkbox">
          </td>
          <td class="product"></td>
          <td class="quantity-required">
          </td>
          <td class="quantity-in-cart__container">
            <p>
              <input class="quantity-in-cart" inputmode="decimal"> kg
            </p>
            <p>
              $ <input class="price" value="0" inputmode="decimal">
            </p>
          </td>
          <td class="amount__container">
            $<span class="amount">0</span>
          </td>
          <td class="stock">
            0
          </td>
        </tr>
    </template>

    <h2>Everyday Rewards</h2>
      <p>
        Split the cost of a receipt between Danny and Luis.
      </p>
      <p>
        <a href="https://www.woolworthsrewards.com.au/index.html#/my-activity" target="_blank">
          Everyday Rewards
        </a>
      </p>

      <p>
        <a href="https://luiscaceres.github.io/everyday-rewards.js" target="_blank">
          Javascript file
        </a>
      </p>

      <p>
        <button id="button-copy">Write contents of Javascript file to clipboard</button>
      </p>

      <script>
        const button = document.querySelector('#button-copy');

        button.addEventListener('click', async () => {
          const response = await fetch('https://luiscaceres.github.io/everyday-rewards.js');
          const responseText = await response.text();

          navigator.clipboard.writeText(responseText);
        });
      </script>

    <script>
      const table = document.querySelector('table');

      const dataSets = [

        // ID   -  STOCK   - REQUIRED -    ITEM

        `?????? - 0.000 kg -     5    - Bananas`,
        `825869 - 0.250 kg - 1.500 kg - Zucchinis`,
        `824508 - 0.000 kg - 1.000 kg - Carrots`,
        `825870 - 0.000 kg - 1.000 kg - Capsicums`,
        `?????? - 0.400 kg - 1.000 kg - Tomatoes`,
        `?????? - 0.000 kg - 1.000 kg - Cucumbers`,
        `?????? - 0.000 kg - 2.100 kg - Potatoes`,
        `?????? - 0.000 kg - 2.100 kg - Sweet potatoes`,
        `?????? - 0.000 kg - 1.400 kg - Beetroots`,
        `?????? - 0.100 kg - 1.400 kg - Swedes`,
        `?????? - 0.000 kg - 0.300 kg - Green beans`,
        `?????? - 0.000 kg - 0.400 kg - Whole pumpkin`,
        `?????? - 0.900 kg - 1.400 kg - Chokoes`,
        `?????? - 0.000 kg - 1.000 kg - Parsnips`,
        `?????? - 0.000 kg -     1    - Onions`,
        `120080 - 0.000 kg -     2    - Avocados`,

        `126497 - 0.000 kg - 1.050 kg - Salmon`,
        `710953 - 0.500 kg - 1.050 kg - Chicken breasts`,
        ` 87465 - 0.000 kg - 1.800 kg - Basa fish`,
        ` 67763 - 0.000 kg - 0.800 kg - Turkey breasts`,

        `119028 - 0 - 3 or 2.100 kg  - Package of tofu (0.900 kg) ORIGINAL REGULAR FIRM`,
        `634919 - 0 - 1              - Bag of wraps`,
        `321220 - 0 - 3 or 1.750 kg  - Bag of oats (0.750 kg)`,
        `779134 - 0 - 4 or 3.850 lt  - Carton of almond milk (1 lt)`,

        `750029 - 0 - 1 or 3.150 kg  - Bag of rice (5 kg)`,
        `499695 - 0 - 1              - Bag of quinoa (1 kg)`,
        `259399 - 0.000 kg - 0.600 kg - Chick peas`,

        `581163 - 0 - 1              - Tube of toothpaste`,
 
        `175905 - 0 - 1 or 7 eggs    - Package of eggs (12 eggs / 0.700 kg)`,

        `768570 - 0.600 kg - 0.500 kg - Frozen corn`,
        ` 96845 - 0.600 kg - 0.500 kg - Frozen peas`,
        `768559 - 0.000 kg - 1.500 kg - Frozen broccolies`,
        `768583 - 0.500 kg - 1.000 kg - Frozen brussel sprouts`,
        `768560 - 1.325 kg - 1.500 kg - Frozen cauliflowers`,

        `586517 - 1.6 - 1 or 0.900 kg  - Bag of mixed berries (1 kg)`,
      ];

      dataSets.forEach(dataSet => {
        const [product, quantityRequired, stock, id] = dataSet.split('-').reverse();
        const row = insertRow();

        row.querySelector('.product').innerText = product;
        row.querySelector('.quantity-required').innerText = quantityRequired;
        row.querySelector('.stock').innerText = stock;
        row.querySelector('.price').value = 0 /*getPrice(id)*/;
      });

      
      

      //
      function insertRow() {
        const row = document.querySelector('template').content.querySelector('.row').cloneNode(true);
        table.append(row);
        
        return row;
      }




      //
      function calculateQuantityRequired() {
        const rows = [...table.rows].slice(1);
        
        rows.forEach(row => {
          const [cell, quantityInCart] = row.querySelectorAll('.quantity-required, .quantity-in-cart');
          
          const stock = parseFloat(row.querySelector('.stock').innerText);
          const quantityRequired = parseFloat(cell.innerText);

          cell.innerText = `${(quantityRequired - stock).toFixed(3)} kg`;
          quantityInCart.value = (quantityRequired - stock).toFixed(3);
        });
      }




      // Work out how much I'll need to pay at check out as I add items to my cart.
      function update() {
        const rows = [...table.rows].slice(1);
        let total = 0;

        rows.forEach(row => {
          const quantityInCart = +row.querySelector('.quantity-in-cart').value;
          const price = +row.querySelector('.price').value;
          const amount = +(quantityInCart * price).toFixed(2);

          row.querySelector('.amount').innerText = amount;
          total += amount;  
        });

        document.querySelector('.total').innerText = total.toFixed(2);
      }


      calculateQuantityRequired();
      insertRow();
      insertRow();
      document.querySelector('#insert-row').addEventListener('click', insertRow);
      setInterval(update, 1000);
    </script>
  </body>
</html>
