<table>
  <tr>
    <th>Done?</th>
    <th>Product</th>
    <th>Quantity
    Required
    </th>
    <th>Quantity In Cart</th>
    <th>Price</th>
    <th>Stock</th>
  </tr>
</table>

<template>
  <table>
    <tr>
      <td class="done">
        <input type="checkbox">        
      </td>
      <td class="price">
        <input value="0" inputmode="decimal">
      </td>
      <td class="quantity-in-cart">
        <input inputmode="decimal">
      </td>
    </tr>
  </table>
</template>

<style>
  table {
    border-collapse: collapse;
  }
  
  td,
  th {
    padding: 0.5rem;
    border: solid;
  }
  
  td:first-of-type {
    text-align: center;
  }
  
  td:nth-of-type(3) {
    text-align: right;
  }
  
  th:nth-of-type(3) {
    white-space: pre-line;
  }
  
  .price > input,
  .quantity-in-cart > input {
    width: 5rem;
  }
</style>


<script>
  
  const table = document.querySelector('table');
  const template =  document.querySelector('template').content;

  const rows = `
      0 - 2100gr - Potatoes
    * 0 - 2100gr - Sweet Potatoes
    * 0 - 1500gr - Zucchinis
    * 0 - 1000gr - Carrots
    * 0 - 1400gr - Swedes
    * 0 - 1500gr - Frozen Broccolies
    * 0 -  400gr - Whole Pumpkin
    * 0 - 1400gr - Beetroots
    * 0 - 1500gr - Frozen Cauliflowers
    * 0 - 1000gr - Brussel Sprouts
    * 0 -  300gr - Green Beans
    * 0 - 1400gr - Chokoes
    * 0 - 1000gr - Capsicums
    * 0 - 1000gr - Cucumbers
    * 0 - 1000gr - Tomatoes
    * 0 -  500gr - Frozen Corn
    * 0 -  500gr - Frozen Peas
    * 0 -  600gr - Chick peas
    * 0 - 1000gr - Parsnips
    * 0 -      5 - Bananas
    * 0 -      1 - Onions
    * 0 -      2 - Avocados
    * 0 -      1 - Bags of Oats
    * 0 -      1 - Cartons of Almond Milk
    * 0 -      1 - Tins of Chick Peas
    * 0 -      1 - Bags of Wraps
  `;

  rows.split('*').forEach(row => {
    const tr = document.createElement('tr');
    
    // 'Done' column
    {
      const td = template.querySelector('.done').cloneNode(true);
      tr.append(td);
    }

    const [product, quantityRequired, stock] = row.split('-').reverse();
    
    // 'Product' column
    {
      const td = document.createElement('td');
      td.textContent = product;
      tr.append(td);
    }
    
    // 'Quantity required' column
    {
      const td = document.createElement('td');
      td.textContent = quantityRequired;
      tr.append(td);
    }
    
    // 'Quantity in cart' column
    {
      const td = template.querySelector('.quantity-in-cart').cloneNode(true);
      tr.append(td);
    }
    
    // 'Price' column
    {
      const td = template.querySelector('.price').cloneNode(true);
      tr.append(td);
    }

    // 'Stock' column
    {
      const td = document.createElement('td');
      td.textContent = stock;
      tr.append(td);
    }

    table.append(tr);
  });
  
</script>
