<table>
  <tr>
    <th>Product</th>
    <th>Quantity</th>
    <th>Price</td>
    <th>In Cart?</th>
  </tr>
</table>

<template>
  <input class="price">
  <input type="checkbox" class="checkbox" inputmode="decimal">
</template>

<style>
 
  table {
    border-collapse: collapse;
  }
  
  td,
  th {
    padding: 0.5rem;
    border: solid;
  }
  
  td:first-of-type {
    text-align: right;
  }
  
  td:nth-of-type(4) {
    text-align: center;
  }
  
  .price {
    width: 5rem;
  }
</style>


<script>
  
  const table = document.querySelector('table');
  const fragment =  document.querySelector('template');

  const rows = `
      2100gr - Potatoes
    * 2100gr - Sweet Potatoes
    * 1500gr - Zucchinis
    * 1000gr - Carrots
    * 1400gr - Swedes
    * 1500gr - Frozen Broccolies
    *  400gr - Whole Pumpkin
    * 1400gr - Beetroots
    * 1500gr - Frozen Cauliflowers
    * 1000gr - Brussel Sprouts
    *  300gr - Green Beans
    * 1400gr - Chokoes
    * 1000gr - Capsicums
    * 1000gr - Cucumbers
    * 1000gr - Tomatoes
    *  500gr - Frozen Corn
    *  500gr - Frozen Peas
    *  600gr - Chick peas         
    * 1000gr - Parsnips
    *      2 - Avocados
  `;

  rows.split('*').forEach(row => {
    const tr = document.createElement('tr');

    row.split('-').forEach((cell, index) => {
      const td = document.createElement('td');
      td.textContent = cell;
      tr.append(td);
    });

    {
      const td = document.createElement('td');
      const input = fragment.querySelector('.price').cloneNode();

      td.append(input);
      tr.append(td);
    }

    {
      const td = document.createElement('td');
      const input = fragment.querySelector('.checkbox').cloneNode();

      td.append(input);
      tr.append(td);
    }

    table.append(tr);
  });
  
</script>
