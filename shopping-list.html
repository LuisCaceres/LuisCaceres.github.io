<html>
  <head>
    <title>Luis - Shopping List</title>
    <meta name="viewport" content="width=device-width,initial-scale=1">
  </head>
  <body>
    <style>
      table {
        border-collapse: collapse;
      }

      td,
      th {
        padding: 0.5rem;
        border: solid;
      }

      td:first-of-type {
        text-align: center;
      }

      td:nth-of-type(3) {
        text-align: right;
      }

      th:nth-of-type(3) {
        white-space: pre-line;
      }

      .price,
      .quantity-in-cart {
        width: 3rem;
      }
      
      .table__header {
        background-color: antiquewhite;
        position: sticky;
        top: 0;
      }

      .total__container {
        padding: 1rem;
        background-color: skyblue;
        border: solid 0.5rem;
        position: sticky;
        bottom: 0;
      }
    </style>

    <table>
      <tr class="table__header">
        <th>Done?</th>
        <th>Product</th>
        <th>Quantity
        Required
        </th>
        <th>Quantity In Cart</th>
        <th>Price</th>
        <th>Amount</th>
        <th>Stock</th>
      </tr>
    </table>

    <p class="total__container">
      Total: <strong>$<span class="total">0</span></strong>
    </p>

    <template>
      <table>
        <tr>
          <td class="done">
            <input type="checkbox">
          </td>
          <td class="quantity-in-cart__container">
            <input class="quantity-in-cart" inputmode="decimal"> kg
          </td>
          <td class="price__container">
            <input class="price" value="0" inputmode="decimal">
          </td>
          <td class="amount__container">
            $<span class="amount">0</span>
          </td>
          <td class="stock">
            0
          </td>
        </tr>
      </table>
    </template>

    <script>
      const table = document.querySelector('table');
      const template =  document.querySelector('template').content;

      const rows = `
          0 - 2.100 kg - Potatoes
        * 0 - 2.100 kg - Sweet potatoes
        * 0 - 1.500 kg - Zucchinis
        * 0 - 1.000 kg - Carrots
        * 0 - 1.400 kg - Swedes
        * 0 - 1.500 kg - Frozen broccolies
        * 0 - 0.400 kg - Whole pumpkin
        * 0 - 1.400 kg - Beetroots
        * 0 - 1.500 kg - Frozen cauliflowers
        * 0 - 1.000 kg - Brussel sprouts
        * 0 - 0.300 kg - Green beans
        * 0 - 1.400 kg - Chokoes
        * 0 - 1.000 kg - Capsicums
        * 0 - 1.000 kg - Cucumbers
        * 0 - 1.000 kg - Tomatoes
        * 0 - 0.500 kg - Frozen corn
        * 0 - 0.500 kg - Frozen peas
        * 0 - 0.600 kg - Chick peas
        * 0 - 1.000 kg - Parsnips
        * 0 -     5    - Bananas
        * 0 -     1    - Onions
        * 0 -     2    - Avocados

        * 0 - 1.050 kg - Salmon
        * 0 - 1.050 kg - Chicken breasts
        * 0 - 1.800 kg - Basa fish
        * 0 - 0.800 kg - Turkey breasts
        
        * 0 - 1 (7 eggs)   - Package of eggs (12)
        
        * 0 - 3 (2.100 kg) - Package of tofu (0.900 kg)
        
        * 0 - 4 (3.850 lt) - Carton of almond milk (1 lt)
        
        * 0 - 3 (1.750 kg) - Bag of oats (0.750 kg)
        * 0 - 2            - Tin of chick peas
        * 0 - 1            - Bag of wraps
        
        * 0 - 1 (3.150 kg) - Bag of rice (5 kg)
        * 0 - 1            - Bag of Quinoa
        
        * 0 -      1 - Tube of toothpaste

        * 0 - 1 (0.900 kg) - Bag of mixed berries (1 kg)
      `;

      rows.split('*').forEach(row => {
        const tr = document.createElement('tr');

        // 'Done' column
        {
          const td = template.querySelector('.done').cloneNode(true);
          tr.append(td);
        }

        const [product, quantityRequired, stock] = row.split('-').reverse();

        // 'Product' column
        {
          const td = document.createElement('td');
          td.textContent = product;
          tr.append(td);
        }

        // 'Quantity required' column
        {
          const td = document.createElement('td');
          td.textContent = quantityRequired;
          tr.append(td);
        }

        // 'Quantity in cart' column
        {
          const td = template.querySelector('.quantity-in-cart__container').cloneNode(true);
          tr.append(td);
        }

        // 'Price' column
        {
          const td = template.querySelector('.price__container').cloneNode(true);
          tr.append(td);
        }

        // 'Amount' column
        {
          const td = template.querySelector('.amount__container').cloneNode(true);
          tr.append(td);
        }

        // 'Stock' column
        {
          const td = template.querySelector('.stock').cloneNode(true);
          td.textContent = stock;
          tr.append(td);
        }

        table.append(tr);
      });

      // 'Amount'
      function update() {
        const rows = [...table.rows].slice(1);
        
        rows.forEach(row => {
          const quantityInCart = +row.querySelector('.quantity-in-cart').value;
          const price = +row.querySelector('.price').value;
          const amount = (quantityInCart * price).toFixed(2);
          row.querySelector('.amount').textContent = amount;
        });
        
        const total = [...document.querySelectorAll('.amount')].map(cell => cell.textContent).reduce((a, b) => a + +b, 0);
        document.querySelector('.total').textContent = total;
      }
      
      setInterval(update, 1000);
    </script>    
  </body>
</html>
