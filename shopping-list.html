<table>
  <tr>
    <th>In Cart?</th>
    <th>Product</th>
    <th>Quantity</th>
    <th>Price</th>
    <th>Stock</th>
  </tr>
</table>

<template>
  <input class="price" inputmode="decimal">
  <input type="checkbox" class="checkbox">
  <td class="stock">
    <input inputmode="decimal">
  </td>
</template>

<style>
 
  table {
    border-collapse: collapse;
  }
  
  td,
  th {
    padding: 0.5rem;
    border: solid;
  }
  
  td:first-of-type {
    text-align: center;
  }
  
  td:nth-of-type(3) {
    text-align: right;
  }
  
  .price {
    width: 5rem;
  }
</style>


<script>
  
  const table = document.querySelector('table');
  const template =  document.querySelector('template').content;

  const rows = `
      2100gr - Potatoes
    * 2100gr - Sweet Potatoes
    * 1500gr - Zucchinis
    * 1000gr - Carrots
    * 1400gr - Swedes
    * 1500gr - Frozen Broccolies
    *  400gr - Whole Pumpkin
    * 1400gr - Beetroots
    * 1500gr - Frozen Cauliflowers
    * 1000gr - Brussel Sprouts
    *  300gr - Green Beans
    * 1400gr - Chokoes
    * 1000gr - Capsicums
    * 1000gr - Cucumbers
    * 1000gr - Tomatoes
    *  500gr - Frozen Corn
    *  500gr - Frozen Peas
    *  600gr - Chick peas         
    * 1000gr - Parsnips
    *      5 - Bananas
    *      1 - Onions
    *      2 - Avocados
    *      1 - Bags of Oats
    *      1 - Cartons of Almond Milk
    *      1 - Tins of Chick Peas
    *      1 - Bags of Wraps
  `;

  rows.split('*').forEach(row => {
    const tr = document.createElement('tr');
    
    {
      const td = document.createElement('td');
      const input = template.querySelector('.checkbox').cloneNode();

      td.append(input);
      tr.append(td);
    }

    row.split('-').reverse().forEach((cell, index) => {
      const td = document.createElement('td');
      td.textContent = cell;
      tr.append(td);
    });

    {
      const td = document.createElement('td');
      const input = template.querySelector('.price').cloneNode();

      td.append(input);
      tr.append(td);
    }
    
    {
      const td = template.querySelector('.stock').cloneNode(true);
      tr.append(td);
    }

    table.append(tr);
  });
  
</script>
