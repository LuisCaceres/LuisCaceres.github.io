<html>
  <head>
    <title>Luis - Shopping List</title>
    <meta name="viewport" content="width=device-width,initial-scale=1">
  </head>
  <body>
    <style>
      table {
        border-collapse: collapse;
      }

      td,
      th {
        padding: 0.5rem;
        border: solid;
      }

      td:first-of-type {
        text-align: center;
      }

      td:nth-of-type(3) {
        text-align: right;
      }

      th:nth-of-type(3) {
        white-space: pre-line;
      }

      .price,
      .quantity-in-cart {
        width: 5rem;
      }

      .total__container {
        padding: 1rem;
        background-color: skyblue;
        border: solid 0.5rem;
        position: sticky;
        bottom: 0;
      }
    </style>

    <table>
      <tr>
        <th>Done?</th>
        <th>Product</th>
        <th>Quantity
        Required
        </th>
        <th>Quantity In Cart</th>
        <th>Price</th>
        <th>Amount</th>
        <th>Stock</th>
      </tr>
    </table>

    <p class="total__container">
      Total: <strong>$<span class="total">0</span></strong>
    </p>

    <template>
      <table>
        <tr>
          <td class="done">
            <input type="checkbox">        
          </td>
          <td class="price__container">
            <input class="price" value="0" inputmode="decimal">
          </td>
          <td class="quantity-in-cart__container">
            <input class="quantity-in-cart" inputmode="decimal">
          </td>
          <td class="amount">
            0
          </td>
        </tr>
      </table>
    </template>

    <script>
      const table = document.querySelector('table');
      const template =  document.querySelector('template').content;

      const rows = `
          0 - 2.1 kg - Potatoes
        * 0 - 2.1 kg - Sweet Potatoes
        * 0 - 1.5 kg - Zucchinis
        * 0 - 1.0 kg - Carrots
        * 0 - 1.4 kg - Swedes
        * 0 - 1.5 kg - Frozen Broccolies
        * 0 - 0.4 kg - Whole Pumpkin
        * 0 - 1.4 kg - Beetroots
        * 0 - 1.5 kg - Frozen Cauliflowers
        * 0 - 1.0 kg - Brussel Sprouts
        * 0 - 0.3 kg - Green Beans
        * 0 - 1.4 kg - Chokoes
        * 0 - 1.0 kg - Capsicums
        * 0 - 1.0 kg - Cucumbers
        * 0 - 1.0 kg - Tomatoes
        * 0 - 0.5 kg - Frozen Corn
        * 0 - 0.5 kg - Frozen Peas
        * 0 - 0.6 kg - Chick peas
        * 0 - 1.0 kg - Parsnips
        * 0 -      5 - Bananas
        * 0 -      1 - Onions
        * 0 -      2 - Avocados

        * 0 - 1.050 kg - Salmon
        * 0 - 1.050 kg - Chicken Breasts
        * 0 - 1.800 kg - Basa Fish
        * 0 - 0.800 kg - Turkey
        
        * 0 -      7 - Eggs
        
        * 0 -      5 - Packages of Tofu
        
        * 0 -      4 - Cartons of Almond Milk
        
        * 0 -      5 - Bags of Oats
        * 0 -      4 - Tins of Chick Peas
        * 0 -      2 - Bags of Wraps
        
        * 0 -      2 - Bags of Rice
        * 0 -      1 - Bags of Quinoa
        
        * 0 -      1 - Packages of Toothpaste

        * 0 - 0.900 kg - Bags of Mixed Berries (2 weeks)
      `;

      rows.split('*').forEach(row => {
        const tr = document.createElement('tr');

        // 'Done' column
        {
          const td = template.querySelector('.done').cloneNode(true);
          tr.append(td);
        }

        const [product, quantityRequired, stock] = row.split('-').reverse();

        // 'Product' column
        {
          const td = document.createElement('td');
          td.textContent = product;
          tr.append(td);
        }

        // 'Quantity required' column
        {
          const td = document.createElement('td');
          td.textContent = quantityRequired;
          tr.append(td);
        }

        // 'Quantity in cart' column
        {
          const td = template.querySelector('.quantity-in-cart__container').cloneNode(true);
          tr.append(td);
        }

        // 'Price' column
        {
          const td = template.querySelector('.price__container').cloneNode(true);
          tr.append(td);
        }

        // 'Amount' column
        {
          const td = template.querySelector('.amount').cloneNode(true);
          tr.append(td);
        }

        // 'Stock' column
        {
          const td = document.createElement('td');
          td.textContent = stock;
          tr.append(td);
        }

        table.append(tr);
      });

      // 'Amount'
      function update() {
        const prices = document.querySelectorAll('.price').forEach(price => {
          const value = price.value;
          const quantityInCart = +price.parentElement.parentElement.cells[3].firstElementChild.value;
          const amount = value * quantityInCart;
          const stock = price.parentElement.parentElement.cells[5];
          stock.textContent = amount;
        });
        
        const total = [...document.querySelectorAll('.amount')].map(cell => cell.textContent).reduce((a, b) => a + +b, 0);
        document.querySelector('.total').textContent = total;
      }
      
      setInterval(update, 1000);
    </script>    
  </body>
</html>
