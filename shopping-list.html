<html>
  <head>
    <title>Luis - Shopping List</title>
    <meta name="viewport" content="width=device-width,initial-scale=1">
  </head>
  <body>
    <style>
      table {
        border-collapse: collapse;
      }

      td,
      th {
        padding: 0.5rem;
        border: solid;
      }

      td:first-of-type {
        text-align: center;
      }

      td:nth-of-type(3) {
        text-align: right;
      }

      th:nth-of-type(3) {
        white-space: pre-line;
      }

      .price,
      .quantity-in-cart {
        width: 3rem;
      }

      .table__container {
        width: 100%;
        margin-bottom: 1rem;
        overflow: auto;
      }
      
      .table__header {
        background-color: antiquewhite;
        position: sticky;
        top: 0;
      }

      .toolbar {
        display: flex;
        justify-content: space-between;        
        align-items: center;
        padding: 1rem;
        background-color: skyblue;
        border: solid 0.1rem;
        position: sticky;
        bottom: 0;
      }

      .button__container,
      .total__container {
        margin: 0;
      }
      
      #insert-row {
        padding: 1rem;
        border: solid 0.25rem;
      }
    </style>

    <div class="table__container">
      <table>
        <tr class="table__header">
          <th>Done?</th>
          <th>Product</th>
          <th>Quantity
          Required
          </th>
          <th>Quantity In Cart</th>
          <th>Price</th>
          <th>Amount</th>
          <th>Stock</th>
        </tr>
      </table>
    </div>

    <div class="toolbar">
      <p class="total__container">
        Total: <strong>$<span class="total">0</span></strong>
      </p>

      <p class="button__container">
        <button type="button" id="insert-row">Insert row</button>
      </p>
    </div>

    <template>
      <table>
        <tr>
          <td class="done">
            <input type="checkbox">
          </td>
          <td class="product"></td>
          <td class="quantity-required">
          </td>
          <td class="quantity-in-cart__container">
            <input class="quantity-in-cart" inputmode="decimal"> kg
          </td>
          <td class="price__container">
            <input class="price" value="0" inputmode="decimal">
          </td>
          <td class="amount__container">
            $<span class="amount">0</span>
          </td>
          <td class="stock">
            0
          </td>
        </tr>
      </table>
    </template>

    <script>
      const table = document.querySelector('table');

      const rows = `
          0.000 kg -     5    - Bananas
        * 0.000 kg - 2.100 kg - Potatoes
        * 0.725 kg - 2.100 kg - Sweet potatoes
        * 0.000 kg - 1.500 kg - Zucchinis
        * 0.000 kg - 1.000 kg - Carrots
        * 0.225 kg - 1.400 kg - Beetroots
        * 0.000 kg - 1.400 kg - Swedes
        * 0.000 kg - 0.400 kg - Whole pumpkin
        * 0.000 kg - 0.300 kg - Green beans
        * 0.000 kg - 1.400 kg - Chokoes
        * 0.200 kg - 1.000 kg - Capsicums
        * 0.100 kg - 1.000 kg - Cucumbers
        * 0.075 kg - 1.000 kg - Tomatoes
        * 0.000 kg - 1.000 kg - Parsnips
        * 0.000 kg -     1    - Onions
        * 0.000 kg -     2    - Avocados

        * 0.000 kg - 1.050 kg - Salmon
        * 0.000 kg - 1.050 kg - Chicken breasts
        * 0.000 kg - 1.800 kg - Basa fish
        * 0.000 kg - 0.800 kg - Turkey breasts

        * 0.000 kg - 0.600 kg - Chick peas

        * 0.325 kg - 0.500 kg - Frozen corn
        * 0.225 kg - 0.500 kg - Frozen peas
        * 0.000 kg - 1.500 kg - Frozen broccolies
        * 0.000 kg - 1.000 kg - Frozen brussel sprouts
        * 0.000 kg - 1.500 kg - Frozen cauliflowers
        
        * 0 - 1 or 0.900 kg  - Bag of mixed berries (1 kg)        
        
        * 0 - 1 or 7 eggs    - Package of eggs (12)
        
        * 0 - 3 or 2.100 kg  - Package of tofu (0.900 kg)
        
        * 0 - 4 or 3.850 lt  - Carton of almond milk (1 lt)
        
        * 0 - 3 or 1.750 kg  - Bag of oats (0.750 kg)
        * 0 - 1              - Bag of wraps
        
        * 0 - 1 or 3.150 kg  - Bag of rice (5 kg)
        * 0 - 1              - Bag of quinoa (1 kg)
        
        * 0 - 1              - Tube of toothpaste
      `;

      rows.split('*').forEach(row => {
        const [product, quantityRequired, stock] = row.split('-').reverse();
        const tr = insertRow();

        tr.querySelector('.product').textContent = product;
        tr.querySelector('.quantity-required').textContent = quantityRequired;
        tr.querySelector('.stock').textContent = stock;
      });

      
      

      //
      function insertRow() {
        const template =  document.querySelector('template').content;
        const tr = document.createElement('tr');

        const classTokens = [
          'done', 'product', 'quantity-required', 'quantity-in-cart__container', 'price__container', 'amount__container', 'stock'
        ];

        for (const classToken of classTokens) {
            const td = template.querySelector(`.${classToken}`).cloneNode(true);
            tr.append(td);
        }

        table.append(tr);

        return tr;
      }




      //
      function calculateQuantityRequired() {
        const rows = [...table.rows].slice(1);
        
        rows.forEach(row => {
          const cell = row.querySelector('.quantity-required');
          
          const stock = parseFloat(row.querySelector('.stock').textContent);
          const quantityRequired = parseFloat(cell.textContent);

          cell.textContent = `${(quantityRequired - stock).toFixed(3)} kg`;
        });
      }




      // Work out how much I'll need to pay at check out as I add items to my cart.
      function update() {
        const rows = [...table.rows].slice(1);

        rows.forEach(row => {
          const quantityInCart = +row.querySelector('.quantity-in-cart').value;
          const price = +row.querySelector('.price').value;
          const amount = (quantityInCart * price).toFixed(2);
          row.querySelector('.amount').textContent = amount;
        });

        const total = [...document.querySelectorAll('.amount')].map(cell => cell.textContent).reduce((a, b) => a + +b, 0);
        document.querySelector('.total').textContent = total.toFixed(2);
      }


      calculateQuantityRequired();
      insertRow();
      insertRow();
      document.querySelector('#insert-row').addEventListener('click', insertRow);
      setInterval(update, 1000);
    </script>
  </body>
</html>
