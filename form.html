<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <title></title>
  <meta name="author" content="">
  <link href="https://www.mymusclechef.com/on/demandware.static/Sites-au-mmc-Site/-/en_AU/v1590383297661/css/global.css"
    rel="stylesheet" type="text/css"/>
</head>

<body>
  <form
    action=""
    data-component-name="form"
    method=""
    <!-- stops browser from using built-in UI for form validation messages -->
    novalidate>

    <div data-form-notification-error hidden></div>
    <div data-form-notification-loading hidden></div>
    <div data-form-notification-success hidden></div>

    <ul>
      <li>
        <p>
          <label>Name:</label>
          <input
            <!-- link this control to a validation message -->
            data-form-validation-message-id=""
            <!-- always add a `name` attribute with a value otherwise control is ignored -->
            name="foo">
        </p>
        <!-- validation message -->
        <p data-form-validation-message-id="<id>" hidden></p>
      </li>
    </ul>
    
    <button>Submit</button>
  </form>
</body>

</html>
