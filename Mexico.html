<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Trip to Mexico</title>
</head>

<body>
    <style>
      body {
        display: flex;
        flex-direction: column;
        margin: 0;
        background: black;
        overflow: hidden;
      }
        
      .reverse {
        flex-direction: column-reverse;  
      }
      
      #player-1,
      #player-2 {
        width: 100vw;
        height: 100vh;
      }
    </style>

    <div id="player-1"></div>
    <div id="player-2"></div>

    <script>
      async function onYouTubeIframeAPIReady() {
        let player1 = new YT.Player('player-1', {playerVars: {controls: 0}});
        let player2 = new YT.Player('player-2', {playerVars: {controls: 0}});

        const promise1 = new Promise(resolve => {
          player1.addEventListener('onReady', resolve);
        });

        const promise2 = new Promise(resolve => {
          player2.addEventListener('onReady', resolve);
        });

        await Promise.all([promise1, promise2]);

        const playlist = [
          // Manzanillo
          {
            endSeconds: 20,
            startSeconds: 10,
            videoId: "WtSfQsDJsEI",
          },
          {
            endSeconds: 184,
            startSeconds: 167,
            videoId: "WtSfQsDJsEI",
          },
          {
            endSeconds: 220.5,
            startSeconds: 218,
            videoId: "WtSfQsDJsEI",
          },
          {
            endSeconds: 244,
            startSeconds: 230,
            videoId: "WtSfQsDJsEI",
          },
          {
            endSeconds: 635,
            startSeconds: 627,
            videoId: "YhYqJBqFDiI",
          },

          // Patzcuaro
          {
            endSeconds: 452,
            startSeconds: 444,
            videoId: "TJAJ3m44NKk",
          },
          {
            endSeconds: 1232,
            startSeconds: 1226,
            videoId: "TJAJ3m44NKk",
          },
          {
            endSeconds: 632,
            startSeconds: 626,
            videoId: "TJAJ3m44NKk",
          },

          // Paricutín
          {
            endSeconds: 80,
            startSeconds: 72,
            videoId: "npv3_E1Qog0",
          },
          {
            endSeconds: 26,
            startSeconds: 19,
            videoId: "npv3_E1Qog0",
          },

          // Morelia
          {
            endSeconds: 31,  
            startSeconds: 10,
            videoId: "y6qMwcF4KzY",
          },

          // Teotihuacan
          {
            endSeconds: 14,
            startSeconds: 11,
            videoId: "PibnTBi1rrQ",
          },
          {
            endSeconds: 146,
            startSeconds: 139,
            videoId: "PibnTBi1rrQ",
          },
          {
            endSeconds: 375,
            startSeconds: 370,
            videoId: "PibnTBi1rrQ",
          },

          // Mexico City
          {
            endSeconds: 498,
            startSeconds: 472,
            videoId: "GUMXv0VEtoc",
          },

          // Cuicatlan
          {
            endSeconds: 1636,
            startSeconds: 1630,
            videoId: "S7_Lb9OBdoA",
          },
          {
            endSeconds: 2453,
            startSeconds: 2441,
            videoId: "S7_Lb9OBdoA",
          },
          {
            endSeconds: 1760,
            startSeconds: 1749,
            videoId: "S7_Lb9OBdoA",
          },
            
          // Oaxaca
          {
            endSeconds: 539,
            startSeconds: 528,
            videoId: "KzCQJ71CWVQ",
          },
          {
            endSeconds: 518,
            startSeconds: 512,
            videoId: "KzCQJ71CWVQ",
          },
          {
            endSeconds: 13,  
            startSeconds: 10,
            videoId: "Ipk1Hpt7gUw",
          },
          {
            endSeconds: 870,  
            startSeconds: 869,
            videoId: "Ipk1Hpt7gUw",
          },
            
          // Puerto Escondido
          {
            endSeconds: 520,
            startSeconds: 517,
            videoId: "uvnogBtGcd8",
          },
          {
            endSeconds: 646,
            startSeconds: 645,
            videoId: "uvnogBtGcd8",
          },
          {
            endSeconds: 148,
            startSeconds: 140,
            videoId: "uvnogBtGcd8",
          },
          {
            endSeconds: 565,
            startSeconds: 560,
            videoId: "uvnogBtGcd8",
          },
        ];

        player1.mute();
        player1.setPlaybackQuality('highres');
        player2.mute();
        player2.setPlaybackQuality('highres');

        player1.loadVideoById(playlist.shift());

        player2.loadVideoById(playlist.shift());
        await new Promise(resolve => setTimeout(resolve, 1000));
        player2.pauseVideo();

        // Play each video track on the playlist.
        while (playlist.length) {

          await new Promise(resolve => {
            player1.addEventListener('onStateChange', function listener({data}) {

              if (data === YT.PlayerState.ENDED) {
                player2.playVideo();
                document.body.classList.add('reverse');
                player1.removeEventListener('onStateChange', listener);
                resolve();
              }
            });
          });

          player1.loadVideoById(playlist.shift());
          await new Promise(resolve => setTimeout(resolve, 1000));
          player1.pauseVideo();
          
          await new Promise(resolve => {
            player2.addEventListener('onStateChange', function listener({data}) {

              if (data === YT.PlayerState.ENDED) {
                player1.playVideo();
                document.body.classList.remove('reverse');
                player2.removeEventListener('onStateChange', listener);
                resolve();
              }
            });
          });

          player2.loadVideoById(playlist.shift());
          await new Promise(resolve => setTimeout(resolve, 1000));
          player2.pauseVideo();
        }
      }
    </script>
    <script src="https://www.youtube.com/iframe_api"></script>
