<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Trip to Mexico</title>
</head>

<body>
    <style>
      body {
        display: flex;
        flex-direction: column;
        margin: 0;
        background: black;
        overflow: hidden;
      }
        
      .reverse {
        flex-direction: column-reverse;  
      }
      
      #player-1,
      #player-2 {
        width: 100vw;
        height: 100vh;
      }
    </style>

    <div id="player-1"></div>
    <div id="player-2"></div>

    <script>
      async function onYouTubeIframeAPIReady() {
        let player1 = new YT.Player('player-1');
        let player2 = new YT.Player('player-2');

        const promise1 = new Promise(resolve => {
          player1.addEventListener('onReady', resolve);
        });

        const promise2 = new Promise(resolve => {
          player2.addEventListener('onReady', resolve);
        });

        await Promise.all([promise1, promise2]);

        const playlist = [

          // Patzcuaro
          {
            endSeconds: 452,
            startSeconds: 444,
            lenght: 8,
            videoId: "TJAJ3m44NKk",
          },
          {
            endSeconds: 632,
            startSeconds: 626,
            length: 6,
            videoId: "TJAJ3m44NKk",
          },
          {
            endSeconds: 1232,
            startSeconds: 1216,
            length: 6,
            videoId: "TJAJ3m44NKk",
          },

          // Paricutín
          {
            endSeconds: 26,
            startSeconds: 15,
            length: 9,
            videoId: "npv3_E1Qog0",
          },
          {
            endSeconds: 80,
            startSeconds: 68,
            length: 12,
            videoId: "npv3_E1Qog0",
          },

          // Morelia
          {
            endSeconds: 31,  
            startSeconds: 10,
            length: 21,
            videoId: "y6qMwcF4KzY",
          },

          // Oaxaca
          {
            endSeconds: 13,  
            startSeconds: 10,
            length: 3,
            videoId: "Ipk1Hpt7gUw",
          },
          {
            endSeconds: 870,  
            startSeconds: 869,
            length: 1,
            videoId: "Ipk1Hpt7gUw",
          },
          {
            endSeconds: 570,
            startSeconds: 567,
            length: 3,
            videoId: "yVrqZ48neU0",
          },
        ];

        player1.mute();
        player2.mute();

        player1.loadVideoById(playlist.shift());
        player2.cueVideoById(playlist.shift());

        // Play each video track on the playlist.
        while (playlist.length) {

          await new Promise(resolve => {
            player1.addEventListener('onStateChange', function listener({data}) {

              if (data === YT.PlayerState.ENDED) {
                document.body.classList.add('reverse');
                player1.removeEventListener('onStateChange', listener);
                resolve();
              }
            });
          });

          player1.cueVideoById(playlist.shift());

          await new Promise(resolve => {
            player2.addEventListener('onStateChange', function listener({data}) {

              if (data === YT.PlayerState.ENDED) {
                player1.playVideo();
                document.body.classList.remove('reverse');
                player2.removeEventListener('onStateChange', listener);
                resolve();
              }
            });
          });

          player2.cueVideoById(playlist.shift());
        }
      }
    </script>
    <script src="https://www.youtube.com/iframe_api"></script>
</body>

</html>
