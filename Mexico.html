<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <link href="stylesheets/stylesheet.css" rel="stylesheet"/>      
    <title>Trip to Mexico</title>
</head>

<body>
    <div id="player-1"></div>
    <div id="player-2"></div>
    <script>
    async function onYouTubeIframeAPIReady() {
      const player1 = new YT.Player('player-1');
      const player2 = new YT.Player('player-2');
        
      const promise1 = new Promise(resolve => {
        player1.addEventListener('onReady', resolve); 
      });
        
      const promise2 = new Promise(resolve => {
        player2.addEventListener('onReady', resolve); 
      });

      await Promise.all([promise1, promise2]);

      const playlist = [
        // Patzcuaro
        {
          endSeconds: 452,
          startSeconds: 444,
          style: {width: "83vw"},
          videoId: "TJAJ3m44NKk",
          volume: 0,
        },
        {
          endSeconds: 632,
          startSeconds: 626,
          style: {width: "83vw"},
          videoId: "TJAJ3m44NKk",
          volume: 0,
        },        
        {
          endSeconds: 1232,
          startSeconds: 1216,
          style: {width: "83vw"},
          videoId: "TJAJ3m44NKk",
          volume: 0,
        },
          
        // Paricutín
        {
          endSeconds: 26,
          startSeconds: 15,
          style: {width: "83vw"},
          videoId: "npv3_E1Qog0",
          volume: 0,
        },
        {
          endSeconds: 80,
          startSeconds: 68,
          style: {width: "83vw"},
          videoId: "npv3_E1Qog0",
          volume: 0,
        },
          
        // Morelia
        {
          endSeconds: 31,  
          startSeconds: 10,
          style: {width: "83vw"},
          videoId: "y6qMwcF4KzY",
          volume: 0,
        },
          
        // Oaxaca
        {
          endSeconds: 13,  
          startSeconds: 10,
          style: {width: "83vw"},
          videoId: "Ipk1Hpt7gUw",
          volume: 0,
        },
        {
          endSeconds: 870,  
          startSeconds: 869,
          style: {width: "83vw"},
          videoId: "Ipk1Hpt7gUw",
          volume: 0,
        },
        {
          endSeconds: 570,  
          startSeconds: 567,
          style: {width: "83vw"},
          videoId: "yVrqZ48neU0",
          volume: 0,
        },
      ];

      // Plays each video track on the playlist. 
      while (playlist.length) {
        const video = playlist.shift();
        player1.loadVideoById(video);
        player1.setVolume(video.volume);
        
        const [nextVideo] = playlist;
        player2.loadVideoById(nextVideo);
        player2.setVolume(nextVideo.volume);
          
        await new Promise(resolve => {
          player1.addEventListener('onStateChange', function listener({data}) {
            if (data === YT.PlayerState.ENDED) {
              resolve();
              player1.removeEventListener('onStateChange', listener);
            }
          });
        });
      }
    }
    </script>
    <script src="https://www.youtube.com/iframe_api"></script>
</body>

</html>
